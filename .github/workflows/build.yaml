name: Build and Push Add-on

permissions:
  contents: read
  packages: write

on:
  push:
    branches: [main]
    paths:
      - 'piper-yang/**'
      - '.github/workflows/build.yaml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [aarch64, amd64]
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version
        id: version
        run: |
          VERSION=$(grep '^version:' piper-yang/config.yaml | awk '{print $2}')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./piper-yang
          file: ./piper-yang/Dockerfile
          platforms: linux/${{ matrix.arch }}
          build-args: |
            BUILD_FROM=ghcr.io/home-assistant/${{ matrix.arch }}-base-debian:bookworm
            BUILD_ARCH=${{ matrix.arch }}
            WYOMING_PIPER_VERSION=2.2.2
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.arch }}-addon-piper-yang:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/${{ matrix.arch }}-addon-piper-yang:latest
